<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>2.5D</title>
		<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: #e8e8e8;
	background-color: #0a0a0e;
	overflow: hidden;
	touch-action: none;
	font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #0a0a0e;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 8%;
	left: 50%;
	transform: translateX(-50%);
	width: min(420px, 60%);
	height: 6px;
	margin: 0;
	-webkit-appearance: none;
	-moz-appearance: none;
	appearance: none;
	border: none;
	border-radius: 3px;
	background: rgba(255, 255, 255, 0.08);
	overflow: hidden;
}

#status-progress::-webkit-progress-bar {
	background: rgba(255, 255, 255, 0.08);
	border-radius: 3px;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #d4a843, #e8c65a);
	border-radius: 3px;
	transition: width 0.2s ease;
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #d4a843, #e8c65a);
	border-radius: 3px;
}

#status-label {
	position: absolute;
	bottom: calc(8% + 20px);
	left: 50%;
	transform: translateX(-50%);
	font-size: 13px;
	font-weight: 500;
	letter-spacing: 0.08em;
	text-transform: uppercase;
	color: rgba(255, 255, 255, 0.4);
}

#status-notice {
	background-color: rgba(120, 40, 50, 0.9);
	backdrop-filter: blur(8px);
	-webkit-backdrop-filter: blur(8px);
	border-radius: 12px;
	border: 1px solid rgba(180, 60, 70, 0.5);
	color: #e8e0e0;
	font-size: 14px;
	line-height: 1.5;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1.25rem 1.5rem;
	text-align: center;
	z-index: 1;
	max-width: 480px;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="2.5D.icon.png" />
<link rel="apple-touch-icon" href="2.5D.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="2.5D.png" alt="">
			<div id="status-label">Loading</div>
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script>
// Intercept XHR to serve split .pck chunks as a single file
(function() {
	const PCK_PARTS = ['2.5D.pck.part_00', '2.5D.pck.part_01'];
	const PCK_TOTAL = 112056296;
	const OrigXHR = XMLHttpRequest;
	const origOpen = OrigXHR.prototype.open;
	const origSend = OrigXHR.prototype.send;

	OrigXHR.prototype.open = function(method, url) {
		this._url = url;
		return origOpen.apply(this, arguments);
	};

	OrigXHR.prototype.send = function() {
		if (this._url && this._url.toString().endsWith('2.5D.pck')) {
			const xhr = this;
			const onprogress = xhr.onprogress;
			const onload = xhr.onload;
			const onreadystatechange = xhr.onreadystatechange;

			(async function() {
				let loaded = 0;
				const buffers = [];
				for (const part of PCK_PARTS) {
					const resp = await fetch(part);
					const reader = resp.body.getReader();
					const chunks = [];
					while (true) {
						const {done, value} = await reader.read();
						if (done) break;
						chunks.push(value);
						loaded += value.byteLength;
						if (onprogress) {
							onprogress.call(xhr, {loaded: loaded, total: PCK_TOTAL, lengthComputable: true});
						}
					}
					const buf = new Uint8Array(chunks.reduce((a, c) => a + c.byteLength, 0));
					let offset = 0;
					for (const c of chunks) { buf.set(c, offset); offset += c.byteLength; }
					buffers.push(buf);
				}
				const combined = new Uint8Array(PCK_TOTAL);
				let off = 0;
				for (const b of buffers) { combined.set(b, off); off += b.byteLength; }

				Object.defineProperty(xhr, 'readyState', {get: () => 4});
				Object.defineProperty(xhr, 'status', {get: () => 200});
				Object.defineProperty(xhr, 'response', {get: () => combined.buffer});
				if (onreadystatechange) onreadystatechange.call(xhr);
				if (onload) onload.call(xhr);
			})();
			return;
		}
		return origSend.apply(this, arguments);
	};
})();
		</script>
		<script src="2.5D.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"2.5D","experimentalVK":false,"fileSizes":{"2.5D.pck":112056296,"2.5D.wasm":38057390},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
